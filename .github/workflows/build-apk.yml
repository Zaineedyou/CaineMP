name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      run: |
        echo "Setting up Android SDK..."
        mkdir -p /opt/android/cmdline-tools
        cd /opt/android/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        mv cmdline-tools latest
        
        # Accept licenses
        yes | /opt/android/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
        
        # Install required packages
        /opt/android/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "ndk;25.2.9519653" "cmake;3.22.1" > /dev/null 2>&1
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build Debug APK
      run: |
        export ANDROID_HOME=/opt/android
        export ANDROID_SDK_ROOT=/opt/android
        export ANDROID_NDK_ROOT=/opt/android/ndk/25.2.9519653
        ./gradlew assembleDebug --quiet
    
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 11
